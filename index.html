<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="description" content="Best AI Tools Directory 2026 — Discover 50+ AI tools for chat, image generation, video, coding, writing, and more. Updated daily.">
<title>AI Tools Directory 2026 — Best AI Tools Curated</title>
<style>
:root{--bg:#0a0a0a;--card:#111;--accent:#6366f1;--accent2:#22d3ee;--text:#e5e5e5;--text2:#888;--border:#222;--font:system-ui,'PingFang SC',sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.6}
a{text-decoration:none;color:inherit}
.container{max-width:1200px;margin:0 auto;padding:0 24px}

nav{position:sticky;top:0;z-index:100;background:rgba(0,0,0,.9);border-bottom:1px solid var(--border);backdrop-filter:blur(10px)}
nav .inner{max-width:1200px;margin:0 auto;padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:56px}
nav .logo{font-weight:700;font-size:1.1rem;color:#fff}
nav .logo span{background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}

.hero{padding:72px 24px 60px;text-align:center;background:linear-gradient(180deg,#0a0a0a 0%,#0f0f1a 100%)}
.hero h1{font-size:2.6rem;color:#fff;margin-bottom:12px}
.hero h1 span{background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero p{color:var(--text2);font-size:1.05rem;max-width:550px;margin:0 auto 24px}
.hero .count{color:var(--accent2);font-weight:600}

.search-box{display:flex;max-width:500px;margin:0 auto 36px}
.search-box input{flex:1;padding:12px 20px;border:2px solid var(--border);border-radius:28px 0 0 28px;background:var(--card);color:#fff;font-size:.95rem;outline:none}
.search-box input:focus{border-color:var(--accent)}
.search-box button{padding:12px 24px;background:var(--accent);color:#fff;border:none;border-radius:0 28px 28px 0;font-size:.95rem;font-weight:600;cursor:pointer}

.filter-bar{display:flex;gap:8px;margin-bottom:32px;flex-wrap:wrap;justify-content:center}
.filter-btn{padding:8px 18px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:.84rem;cursor:pointer;transition:.2s}
.filter-btn:hover,.filter-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}

.tools-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:18px}
.tool-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:22px;transition:.2s;display:flex;flex-direction:column}
.tool-card:hover{border-color:var(--accent);transform:translateY(-2px)}
.tool-card .header{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.tool-card .icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.4rem;font-weight:700;flex-shrink:0}
.tool-card h3{font-size:1.05rem;color:#fff}
.tool-card .cat{font-size:.72rem;color:var(--accent);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.tool-card p{color:var(--text2);font-size:.84rem;line-height:1.5;flex:1;margin-bottom:12px}
.tool-card .footer{display:flex;justify-content:space-between;align-items:center}
.tool-card .tag{font-size:.7rem;padding:3px 8px;border-radius:10px;background:rgba(99,102,241,.12);color:var(--accent)}
.tool-card .link{font-size:.82rem;color:var(--accent2);font-weight:500}
.tool-card .link:hover{text-decoration:underline}

.result-count{text-align:center;color:var(--text2);font-size:.86rem;margin-bottom:20px}

footer{text-align:center;padding:40px 24px 24px;color:var(--text2);font-size:.78rem;border-top:1px solid var(--border);margin-top:60px}
</style>
</head>
<body>

<nav><div class="inner"><div class="logo">AI<span>Tools</span></div></div></nav>

<section class="hero">
  <h1>Best <span>AI Tools</span> Directory 2026</h1>
  <p>Curated collection of <span class="count" id="toolCount">50</span> AI tools — ChatGPT alternatives, image generators, coding assistants, and more.</p>
  <div class="search-box">
    <input type="text" placeholder="Search AI tools..." id="searchInput">
    <button id="searchBtn">🔍 Search</button>
  </div>
</section>

<div class="container" style="padding-bottom:60px;">
  <div class="filter-bar" id="filterBar">
    <button class="filter-btn active" data-cat="all">All Tools</button>
    <button class="filter-btn" data-cat="Chat">💬 Chat</button>
    <button class="filter-btn" data-cat="Image">🎨 Image</button>
    <button class="filter-btn" data-cat="Video">🎬 Video</button>
    <button class="filter-btn" data-cat="Code">💻 Code</button>
    <button class="filter-btn" data-cat="Writing">✍️ Writing</button>
    <button class="filter-btn" data-cat="Audio">🎵 Audio</button>
    <button class="filter-btn" data-cat="Productivity">⚡ Productivity</button>
  </div>

  <div class="result-count" id="resultCount">Showing 50 tools</div>
  <div class="tools-grid" id="toolsGrid"></div>
</div>

<footer>
  <p>© 2026 AI Tools Directory — Updated daily. Not affiliated with listed services.</p>
</footer>

<script src="assets/js/tools.js"></script>
</body>
</html>
